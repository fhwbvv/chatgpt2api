<script id="gallery-data" type="application/json">[{"post_number": 1, "username": "user792", "post_url": "https://linux.do/t/topic/2036927/1", "image_url": "https://cdn3.ldstatic.com/original/4X/e/0/0/e00812b7f2385b652406608991ebcb877a6c22a5.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/e/0/0/e00812b7f2385b652406608991ebcb877a6c22a5.jpeg", "title": "第1层-图1", "info": "", "prompt": "规则\n\n必须使用 gpt image 2\n\n在评论区留下你的提示词和对应的图片即可\n\n根据点赞数量排一二三名（无关回复不计入统计）\n\n截止到本周日中午十二点\n\n只发图不发提示词的不计入统计\n\n奖品\n\n第一名 星辰200刀兑换码、黑与白邀请码一枚、wong的公益站邀请码一枚、wong的公益站500刀兑换码\n\n第二名 星辰100刀兑换码、黑与白邀请码一枚、wong的公益站邀请码一枚、wong的公益站300刀兑换码\n\n第三名 星辰50刀兑换码、黑与白邀请码一枚、wong的公益站邀请码一枚、wong的公益站100刀兑换码\n\n示例\n\nA young woman wearing a flowing dress stands at the edge of the sea, her back turned to the camera as she gazes upon the glow of the setting sun. The ocean stretches out before her in all its grandeur, and the sun slowly sinks below the horizon, casting a golden light over the water. The woman’s hair sways gently in the breeze, her features softened by the warm hues of the sunset. Her gaze is fixed on the distance, as if pondering the meaning of life and the endless possibilities of the future.", "image_index": 1}, {"post_number": 2, "username": "lezishen", "post_url": "https://linux.do/t/topic/2036927/2", "image_url": "https://cdn3.ldstatic.com/original/4X/1/d/9/1d95ea381fcd07dfa978a42793ab318e75ed0516.png", "thumb_url": "https://cdn3.ldstatic.com/original/4X/1/d/9/1d95ea381fcd07dfa978a42793ab318e75ed0516.png", "title": "第2层-图1", "info": "", "prompt": "这个星辰是啥我好奇 是哪个API站点么", "image_index": 1}, {"post_number": 3, "username": "jack007", "post_url": "https://linux.do/t/topic/2036927/3", "image_url": "https://cdn3.ldstatic.com/original/4X/6/f/5/6f548a95cff69818c326b67ce943029fbb18d65d.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/6/f/5/6f548a95cff69818c326b67ce943029fbb18d65d.jpeg", "title": "第3层-图1", "info": "", "prompt": "9:16 vertical — a 3x3 grid collage (nine images) forming a Kore nux.do/t/topic/2036927/31", "image_url": "https://cdn3.ldstatic.com/original/4X/e/8/6/e8606c4f1a1ee5df50083752c40a52778450fefd.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/e/8/6/e8606c4f1a1ee5df50083752c40a52778450fefd.jpeg", "title": "第31层-图1", "info": "", "prompt": "之前佬友分享的提示词 :\n请根据{北京故宫}自动生成一张“博物馆图鉴式中文拆解信息图”。\n\n要求整张图兼具真实写实主视觉、结构拆解、中文标注、材质说明、纹样寓意、色彩含义和核心特征总结。你需要根据主题自动判断最合适的主体对象、服饰体系、器物结构、时代风格、关键部件、材质工艺、颜色方案与版式结构，用户无需再提供其他信息。\n\n整体风格应为：国家博物馆展板、历史服饰图鉴、文博专题信息图，而不是普通海报、古风写真、电商详情页或动漫插画。背景采用米白、绢纸白、浅茶色等纸张质感，整体高级、克制、专业、可收藏。\n\n版式固定为：\n- 顶部：中文主标题 + 副标题 + 导语\n- 左侧：结构拆解区，中文引线标注关键部件，并配局部特写\n- 右上：材质 / 工艺 / 质感区，展示真实纹理小样并附说明\n- 右中：纹样 / 色彩 / 寓意区，展示主色板、纹样样本和文化解释\n- 底部：穿着顺序 / 构成流程图 + 核心特征总结\n\n若主题适合人物展示，则以真实人物全身站姿为中央主体；若更适合器物或单体结构，则改为中心主体拆解图，但整体仍保持完整中文信息图形式。所有文字必须为简体中文，清晰、规整、可读，不要乱码、错字、英文或拼音。重点突出真实结构、材质差异、文化说明与图鉴气质。\n\n避免：海报感、影楼感、电商感、动漫感、cosplay感、乱标注、错结构、糊字、假材质、过度装饰。", "image_index": 1}, {"post_number": 34, "username": "javooizz", "post_url": "https://linux.do/t/topic/2036927/34", "image_url": "https://cdn3.ldstatic.com/original/4X/1/a/9/1a93aace88f260c364671e9c20ced548bea110c3.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/1/a/9/1a93aace88f260c364671e9c20ced548bea110c3.jpeg", "title": "第34层-图1", "info": "", "prompt": "复仇者联盟风格、特朗普大战小香蕉", "image_index": 1}, {"post_number": 35, "username": "XTer", "post_url": "https://linux.do/t/topic/2036927/35", "image_url": "https://cdn3.ldstatic.com/original/4X/7/9/8/798584beded894328183ae146264a2f750447904.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/7/9/8/798584beded894328183ae146264a2f750447904.jpeg", "title": "第35层-图1", "info": "", "prompt": "提示词抄上面的\n一张充满新春喜庆氛围但不失高雅格调的 2026 杭州城市宣传海报。\n采用双重曝光手法，整体构图延续 S 型的流动感；在纯白的纹理背景右下角，一个身穿中国传统服饰的微缩人物正在挥舞一条长长的红色丝绸舞带，红绸在空中轻盈舞动，展现出丝绸柔顺细腻的质感，并在向左上方飘动的过程中，奇幻地变形成一条壮丽的山水河流。\n\n在这条“河流”之中，叠加出一幅有山、有湖、有江、有城的杭州城市手绘图，整体风格偏国潮，景色尽收眼底，壮阔而秀雅，令人震撼。\n画面中融入杭州地标建筑与景观：西湖、断桥、雷峰塔、三潭印月、六和塔、钱塘江、京杭大运河杭州段、灵隐寺、城隍阁。\n云雾环绕，仙气缥缈，兼具江南诗意与大城气象；色彩丰富，结构复杂，细节繁盛，但由于大面积留白，画面依然显得清新脱俗、雅致高级。\n\n左下角排版着 “SPRING 2026”，并搭配竖排宣传语，整体寓意：“人间天堂，数字之城”、“诗画江南，活力杭州”。\n文字排版优美大方，字迹清晰完整，整体视觉兼具新春节庆感、东方美学、城市文化底蕴与现代都会气质。\n海报尺寸 9:16，高清，细节丰富，适合城市文旅宣传。", "image_index": 1}, {"post_number": 37, "username": "aimer779", "post_url": "https://linux.do/t/topic/2036927/37", "image_url": "https://cdn3.ldstatic.com/original/4X/0/d/6/0d64c4f7bb4595bf7e65b70e9c29c3cf820f170e.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/0/d/6/0d64c4f7bb4595bf7e65b70e9c29c3cf820f170e.jpeg", "title": "第37层-图1", "info": "", "prompt": "以这首诗为蓝本，创造有趣的印象海报，强调解构主义、新存在主义摄影拼贴：\n我当然知道那不是我的月亮\n但有一刻，月亮的确照在了我的身上\n可生活不是电影，我也缺少点运气\n我悄然触摸你，却未曾料想\n你像蒲公英散开了\n到处都是你的模样", "image_index": 1}, {"post_number": 38, "username": "hlool", "post_url": "https://linux.do/t/topic/2036927/38", "image_url": "https://cdn3.ldstatic.com/original/4X/5/2/d/52d4d6b8a8e2e156a2ffd039733e46927eb89764.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/5/2/d/52d4d6b8a8e2e156a2ffd039733e46927eb89764.jpeg", "title": "第38层-图1", "info": "", "prompt": "我来认真的，焚绝，模糊的图片，清晰的实力，热情的点赞\n\n知道了，给大图才有赞", "image_index": 1}, {"post_number": 38, "username": "hlool", "post_url": "https://linux.do/t/topic/2036927/38", "image_url": "https://cdn3.ldstatic.com/original/4X/0/b/2/0b2e3a337f41059154b72581fb82d03d9fb6d814.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/0/b/2/0b2e3a337f41059154b72581fb82d03d9fb6d814.jpeg", "title": "第38层-图2", "info": "", "prompt": "我来认真的，焚绝，模糊的图片，清晰的实力，热情的点赞\n\n知道了，给大图才有赞", "image_index": 2}, {"post_number": 39, "username": "xiaohui06", "post_url": "https://linux.do/t/topic/2036927/39", "image_url": "https://cdn3.ldstatic.com/original/4X/4/7/5/475a51997e446ca54e918e197e3330c6ff9aebfe.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/4/7/5/475a51997e446ca54e918e197e3330c6ff9aebfe.jpeg", "title": "第39层-图1", "info": "", "prompt": "蜜雪冰城雪王变装KFC员工，戴红色围裙，手举炸鸡桶，\n\n夸张表情，大喊“V我50”，\n\n疯狂星期四主题，搞笑 meme 风，\n\n夸张字体，贴纸元素，弹幕风格，\n\n强对比红白配色，动感构图，\n\n社交媒体爆款视觉，抖音风海报，\n\n高清，强光，高锐度，商业广告质感，2比3比例", "image_index": 1}, {"post_number": 40, "username": "Dabian", "post_url": "https://linux.do/t/topic/2036927/40", "image_url": "https://cdn3.ldstatic.com/original/4X/6/a/a/6aaf69ef1e715c77983d9923602ae1ce82e74092.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/6/a/a/6aaf69ef1e715c77983d9923602ae1ce82e74092.jpeg", "title": "第40层-图1", "info": "", "prompt": "来自小米17U的拍摄 带徕卡水印 徕卡经典风格 内容是 xxxx", "image_index": 1}, {"post_number": 41, "username": "HolicX", "post_url": "https://linux.do/t/topic/2036927/41", "image_url": "https://cdn3.ldstatic.com/original/4X/8/d/b/8dbc7fb815c8697359acbfb718e56a75b40eef61.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/8/d/b/8dbc7fb815c8697359acbfb718e56a75b40eef61.jpeg", "title": "第41层-图1", "info": "", "prompt": "Prompt\n\n任务类型与基本规格\n\n单人写实自拍参考图，竖图，室内场景，镜面自拍，背景简洁，生活化环境，非棚拍，高完成度，重点是人物姿态、腿部线条、镜中取景关系。\n\n主体本体特征\n\n成年女性，身材纤细，长腿，脸部大部分被手机遮挡，浅蓝色长卷假发，刘海较厚，双侧黑色系带发饰，整体气质偏安静、精致、轻二次元 cos 感。\n\n着装与材质\n\n白色长袖衬衫，袖口收束，胸前有细节褶饰；高腰灰色格纹短裙，黑色宽腰封/腰带形成明显分割；白色中筒袜；深棕或黑色亮面乐福鞋。材质重点是：​顺滑假发、挺括衬衫、格纹裙布料、亮面皮鞋、柔白袜面​。\n\n动作、镜头、构图模板\n\n人物在镜前半蹲或单膝跪姿，一条腿向侧前方伸展，另一条腿弯折承重；上身微侧，躯干轻微前倾；一只手持手机遮脸自拍，另一只手抬起半挡脸或放在脸侧；​低机位镜前拍摄，腿部占画面大面积，人物位于中下部，门板与地砖构成纵深线条​。\n\n风格与控制项\n\n风格：写实日常 + 轻二次元 cos 氛围，柔和室内光，低对比，干净肤色，生活化镜面反射。\n\n关键锚点：​蓝色长卷发、手机遮脸、蹲姿侧伸腿、灰格短裙、白袜配乐福鞋、镜前室内门口场景​。\n\n负面限制：避免幼态脸、避免多余人物、避免手脚畸形、避免镜像结构错误、避免裙摆和腿部透视错乱、避免背景杂乱、避免把服装误生成为水手服或女仆装。\n\nPrompt2\n\n任务类型与基本规格\n\n单人写实室内手机自拍横图，狭窄角落场景，近距离截取从下巴到大腿中上段，背景简单，画面重点集中在上半身曲线、短裙坐姿、腿部透视和暖色灯光​。\n\n主体本体特征\n\n年轻女性感，脸部基本不入镜，只露少量下巴和颈部；浅蓝色长卷发从两侧垂到胸前。身材表现为上半身纤细、胸部较饱满、腰线明显收紧、骨盆收拢、双腿白皙细直​，整体是轻 cos 感、柔软但曲线清楚的体态。\n\n着装与材质\n\n上装是白色长袖衬衫，胸前有竖向褶饰和小纽扣，布料偏顺滑微亮，袖子略带蓬感；下装是灰黑格纹高腰短百褶裙​，腰部有一圈黑色收束，面料较薄，坐下后裙摆自然外翻起褶。腿部裸露，无鞋袜信息。\n\n动作、镜头、构图模板\n\n人物坐在灰色地砖地面，背部和左肩靠近墙角，躯干微微前倾，右臂前伸举手机自拍，左手自然握住身侧玩偶。双膝朝前，腿向镜头方向伸出，形成胸口—腰部—裙摆—大腿连续下压式透视。镜头位于右上前方略高处向下拍​，裁掉头顶和大部分脸，把胸口、腰线、裙摆和大腿放成主体；左侧白墙和镜面边框、右侧深色门板共同提供封闭空间感，左下角蓝色玩偶作为辅助锚点。\n\n风格与控制项\n\n风格：写实日常手机自拍，​室内暖黄顶灯/侧上方灯​，左侧更亮，右侧偏暗，整体低对比、肤色干净发白、阴影柔和。\n\n关键锚点：​浅蓝长卷发垂胸前、白色微亮衬衫、灰黑格纹短裙、坐地前倾自拍、胸腰腿透视明显、左亮右暗暖光​。\n\n负面限制：​不要完整露脸，不要站姿或跪姿，不要冷白光，不要硬闪光，不要把腿拉得过长，不要改成广角夸张畸变，不要复杂背景，不要漏掉左侧 "第42层-图1", "info": "", "prompt": "请生成一张【潘金莲】的王者荣耀游戏的英雄动画展示页截图", "image_index": 1}, {"post_number": 43, "username": "alidrzml", "post_url": "https://linux.do/t/topic/2036927/43", "image_url": "https://cdn3.ldstatic.com/original/4X/9/3/9/9396deb95804ea901da08d7a9a32860f8f8edf8c.png", "thumb_url": "https://cdn3.ldstatic.com/original/4X/9/3/9/9396deb95804ea901da08d7a9a32860f8f8edf8c.png", "title": "第43层-图1", "info": "", "prompt": "我不是我不是我不是我不是\n\n君の公益上线gpt-image-2\n\n搞七捻三\n\n这是我在X上看到的博主叫李岳发的，生出来的效果简直绝了，你可以试试\n等待你的作业哈哈哈哈\n\ngpt image 2生成城市宣传海报。\n提示词：\n一张充满新春喜庆氛围但不失高雅格调的 2026 城市宣传海报。\n双重曝光，构图延续了S型的流动感；\n在纯白的纹理背景右下角，一个身穿中国传统服饰的微缩人物正在挥舞着一条长长的红色丝绸舞带，这条红绸在空中舞动，不仅展现出丝绸的柔顺质感，更在向左上…\n\n我只是分享出来给大家玩的，改成自己的城市，这一段不是我原创的，来自的博主也提了。", "image_index": 1}, {"post_number": 44, "username": "NullUser", "post_url": "https://linux.do/t/topic/2036927/44", "image_url": "https://cdn3.ldstatic.com/original/4X/6/f/0/6f08c002d4c1036dbe9e18a320755e26931f45b2.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/6/f/0/6f08c002d4c1036dbe9e18a320755e26931f45b2.jpeg", "title": "第44层-图1", "info": "", "prompt": "提示词\n【系统图谱绘制指令：Linux.do 数字生态剖面】\n## 1. 核心概念注入 (System Core)\n你正在绘制一张名为 \"Linux.do (L站)\" 的新型数字社区生态系统的 3D 等距剖视图 (Isometric Cutaway)。\n* 社区灵魂：抵抗算法同质化的中文技术/AI绿洲，由极客共建的\"数字花园\"。\n* 成员称谓：佬友 (Lao You)。\n* 视觉基调：深色赛博背景，霓虹蓝与算力金交织的光照，高科技机械层叠结构。\n## 2. 架构分层映射 (Architecture Layers)\n将社区运转机制转化为 5 层物理结构，从底向上展示：\n* 地基 (L0-L4 信任引擎)：形似核反应堆的底座，标注 L0(新手)-L4(领袖) 的权限光柱，体现\"防喷/防机器\"的准入过滤机制。\n* 逻辑层 (治理与激励)：齿轮与管线交织，标识 \"Neo(始皇) & 核心团队\" 控制中枢，输送名为 \"LDC\" 的社区货币与信用积分。\n* 网络流 (资源分发总线)：发光的数据流管道，动态传输 \"AI 羊毛/API 额度\" 和 \"开源工具情报\"。\n* 交互层 (Discourse 矩阵)：标准 Discourse UI 界面的全息投影，展示 \"搞快点\"、\"资源荟萃\" 等板块的下沉与分类。\n* 外延层 (Connect 接口)：顶部的 OAuth 网关天线，向外部连接 DeepLX 等独立开发 (Indie Dev) 项目。\n## 3. 关键子系统特写 (Sub-systems)\n* 准入漏斗：左侧特写 50 字真人自述的过滤网，拦截水军机器人。\n* 知识沉淀池：右侧展示 Wiki 与文档的结晶化过程。\n## 4. 图例与标注 (Annotations)\n在图纸边缘添加极简数据面板：\n* 建立时间：2024-01-17\n* 核心共识：非功利交流 / 开源共建\n* 状态：活跃膨胀中 (Active Expanding)", "image_index": 1}, {"post_number": 47, "u ehind, with only her upper body visible. Her back and both arms are fully bare. Place her in the center of the frame. Her head and torso lean slightly toward the left side of the image. One arm is raised high above her head, forming a soft, relaxed arc, as if the image has captured a fleeting moment of improvised dance.\nThe figure must be rendered as a near-complete pure black silhouette. Keep only the clean outer contours of the back, shoulders, arms, head, and hair. No skin detail, no tonal modeling on the back, no visible anatomy inside the silhouette, no glowing skin, no illuminated flesh tones. The silhouette should feel solid, dense, and graphic.\nThe sky should be a low-saturation, low-contrast twilight gradient: the top of the frame is a muted dark blue with gray-cyan tones, transitioning in the lower middle area into a very thin layer of dim yellow-orange light near the horizon. The atmosphere should feel dark, heavy, subdued, and restrained, like a film still, not a luminous or picturesque sunset photograph.\nIn the background, include thin power lines, utility poles, one streetlamp already turned on, and sparse shrub shadows on the right side. All ground elements and vegetation should be significantly darkened, almost sinking into black.\nUse natural backlighting. The entire image should feel underexposed by about 1.5 to 2 stops. Keep highlights only near the horizon line. Let the shadows be deeply crushed, with rich blacks, low saturation, and subtle film grain. The final mood should feel real, rough, poetic, lonely, and restrained.\nVisual tone: cinematic, austere, understated, melancholic, tactile, not polished, not glossy, not romanticized.", "image_index": 1}, {"post_number": 95, "username": "fdxxw", "post_url": "https://linux.do/t/topic/2036927/95", "image_url": "https://cdn3.ldstatic.com/original/4X/c/5/e/c5ec035f81c107e8029dfe70ca0f40295ae3b133.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/c/5/e/c5ec035f81c107e8029dfe70ca0f40295ae3b1 here, strong visual appeal for YouTube anime channel branding\n\n✅ 修改重点片段：\nCHARACTER DESIGN（安全版）\n\nOriginal kemonomimi (catgirl) mascot design, blonde twin-braid hairstyle with fluffy cat ears, large expressive eyes with pink-red gradient irises, soft blush on cheeks, playful fang visible, fluffy oversized tail with rich fur texture, stylized anime proportions with soft curves, anime idol-inspired aesthetic\n\nFACE（安全版）\n\nCute and lively expression, one eye winking, bright sparkling eye highlights, slightly open smiling mouth with visible fang, soft blush across cheeks and nose, glossy lips, strong emotional engagement with viewer\n\nPOSE（安全版）\n\nFull-body pose with slight forward lean, hips naturally tilted to create a dynamic silhouette, one hand raised in paw gesture (cat paw glove), playful engaging posture, light bounce in stance, inviting and energetic idol-like presence\n\nCOSTUME（安全版）\n\nFestive red themed outfit inspired by Christmas aesthetics, fur-trimmed short cape with white fluffy edges, ribbon bow details, stylized costume design with soft fabric shading, paw gloves with plush texture, ankle fur accessories with ribbon ties, costume emphasizing cuteness and charm\n\nMOOD（安全版）\n\nCute, playful, warm, romantic, idol-like charm, approachable and engaging, strong mascot personality, eye-catching and thumbnail-friendly", "image_index": 1}, {"post_number": 120, "username": "suxiaomi", "post_url": "https://linux.do/t/topic/2036927/120", "image_url": "https://cdn3.ldstatic.com/original/4X/b/2/b/b2bc49367b49984ceeed7d4020dd7f78cc58e803.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/b/2/b/b2bc49367b49984ceeed7d4020dd7f78cc58e803.jpeg", "title": "第120层-图1", "info": "", "prompt": "麦当劳 × 肯德基的联名，主题是V我50", "image_index": 1}, {"post_number": 121, "username": "stanli", "post_url": "https://linux.do/t/topic/2036927/121", "image_url": "https://cdn3.ldstatic.com/original/4X/4/d/9/4d942e1de06cd23c5f18b2c092faa9092c3a3400.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/4/d/9/4d942e1de06cd23c5f18b2c092faa9092c3a3400.jpeg", "title": "第121层-图1", "info": "", "prompt": "An Oriental Freehand Fantasy Illustration Centered on Traditional Chinese Ink Wash\n\nA vertical long-scroll poster composition that naturally integrates a female silhouette into a landscape. The artwork unfolds through the brushwork relationship of solid and void in harmony, emphasizing blank space and rhythmic flow, embodying the classic artistic conception of literati painting.\n\nThe female silhouette faces right in a horizontal gaze, with soft contours of the forehead, nose bridge, lip line, neck and shoulders outlined in light ink. Her expression is reserved and tranquil, with no detailed facial features required. Her long hair is rendered with splashed ink and dry brush (fēibái) strokes, surging like mist and flowing like vapor, spreading outward from the head and gradually transforming into mountain ranges, clouds and water ripples, merging seamlessly with nature.\n\nWithin her hair and silhouette unfolds a landscape realm:\n\nDistant view: Layered blue-green mountains, with ink tones graduating from dark to light, shrouded in winding clouds and mist.\n\nMiddle view: A cascading waterfall plunging from high cliffs, surrounded by misty vapor, interwoven with blank space.\n\nForeground: Scattered pavilions, terraces and ancient towers hidden among the mountains, arranged in picturesque disorder and partially concealed, creating a profound sense of space.\n\nThe sky and blank areas are washed with light ink to form flowing clouds, with several soaring white cranes dotted at the upper part, depicted with concise strokes to convey dynamism and spirit.Between her hair and shoulders are scattered freehand floral branches (plum, cherry blossom or crabapple), lightly tinted in pale pink or rouge, with petals drifting gently to add vitality and poetry.\n\nIn the lower-middle part, a curved water surface and a stone arch bridge are painted with minimal strokes. The bridge is outlined with central-tip brush lines, while the water beneath is dominated by blank space, with only light ink washes suggesting ripples. A small skiff floats on the water with a lone figure seated inside, rendered in extremely simplified form, emphasizing solitude and ethereal tranquility.\n\nLight is not realistically depicted but implied through coloring and blank space: the upper right is gently tinted with light ochre and pale gold, resembling morning glow, forming a warm contrast with the overall cool blue-black tones, enhancing depth and rhythm.\n\nThe overall style combines traditional Chinese freehand ink wash with blue-green landscape coloring, emphasizing varied brush techniques (central tip, side tip, dry brush, splashed ink), ink layering and rice-paper bleeding effects. Details are restrained and refined, achieving balanced breathing and rhythm between blank space and scenery.\n\nA blank area is reserved at the bottom right for vertical calligraphy of “Mountains and Rivers into Painting” in running script or clerical script, with natural and smooth brushwork, followed by two red seals (zhuànwén or báiwén) to strengthen the classic scroll atmosphere.\n\nMain Colors\n\nInk black, blue-green pigments, light ochre, rouge, and rice-paper off-white\n\nKey Composition\n\nNatural integration of the female silhouette with landscape ink brushwork\n\nAtmosphere\n\nEthereal, serene, distant, poetic", "image_index": 1}, {"post_number": 124, "username": "lsjzshd", "post_url": "https://linux.do/t/topic/2036927/124", "image_url": "https://cdn3.ldstatic.com/original/4X/c/7/b/c7b1bb382fb800503550fbd45af1c8300874d88d.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/c/7/b/c7b1bb382fb800503550fbd45af1c8300874d88d.jpeg", "title": "第124层-图1", "info": "", "prompt": "提示词\n\nFinal Fantasy VII Remake Part 3 ending scene, Aerith Gainsborough revived, emotional reunion with the party, cinematic storytelling, sunset golden hour lighting, warm so 0185d3c9ed65a07a4d993f251d2c19505.jpeg", "title": "第155层-图1", "info": "", "prompt": "可莉希亚：好漂亮的花，是送给我的吗\n\n小洛克：（害羞）嗯嗯，你喜欢就好\n\n等我长大后再来找你玩。\n\n“毕业好烦人，找工作好烦人，想做一辈子小孩，可是我要努力”\n\n小洛克开始上班，渐渐变成了充满班味的大叔。\n\n可丽希亚看着胡子拉碴已经长大的小洛克一脸温柔的看着，露出微笑，踮起脚尖，抚摸你的头，说道： “这些年你经历了很多吧，辛苦了，现在，休息一下吧。”\n\n一页短漫，多个分镜，精美插图画风。", "image_index": 1}, {"post_number": 157, "username": "hejiajun", "post_url": "https://linux.do/t/topic/2036927/157", "image_url": "https://cdn3.ldstatic.com/original/4X/5/c/2/5c29ddd048e526e9ab4e500a9ad8f2e3ae3021dc.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/5/c/2/5c29ddd048e526e9ab4e500a9ad8f2e3ae3021dc.jpeg", "title": "第157层-图1", "info": "", "prompt": "夜晚老城区略显陈旧的小巷入口，XXX坐在门口的椅子上翘起二郎腿，左手接过信封，右手拿着一根点燃的香烟，神情冷淡克制，眼神平静，姿态慵懒却有强大气场。她穿着黑色吊带连衣裙，搭配黑色丝袜和黑色高跟鞋。一个50岁左右、穿着旧白色T恤的老人站在一旁，神情朴实，小心地把一个牛皮信封递给她，画面呈现一种“深夜被帮助”的复杂电影感。场景有昏黄路灯与霓虹反光，地面湿漉漉，墙面斑驳，背景有旧城巷道细节，电影级光影，但是不要太暗了，超高细节，写实风格，8K质感", "image_index": 1}, {"post_number": 158, "username": "usercnmd", "post_url": "https://linux.do/t/topic/2036927/158", "image_url": "https://cdn3.ldstatic.com/original/4X/9/8/7/98777a4513c5d3e75a4533950c816421072446a5.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/9/8/7/98777a4513c5d3e75a4533950c816421072446a5.jpeg", "title": "第158层-图1", "info": "", "prompt": "[!info]\n\n生成一张极限竞速：地平线6和GTA6联合宣传海报", "image_index": 1}, {"post_number": 159, "username": "CtrlAltDefeat", "post_url": "https://linux.do/t/topic/2036927/159", "image_url": "https://cdn3.ldstatic.com/original/4X/3/2/0/3201127769841b145a4ec0c70143342de453926a.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/3/2/0/3201127769841b145a4ec0c70143342de453926a.jpeg", "title": "第159层-图1", "info": "", "prompt": "提示词\n\nA top-down sequence shot from a high-angle, looking down at a young Chinese woman with delicate East Asian features and soft black hair. She is crouching on a garden path, gently teasing a fluffy ginger cat. Dense foliage overhead filters the sunlight, creating a dynamic “Komorebi” effect—shifting, circular patches of light that dance across her skin and the cat’s fur. A subtle, humid haze hangs in the air, catching the sunbeams to create soft, visible volumetric rays (Tyndall effect). As she tilts her head up toward the lens, a light mist softens the edges of the frame, adding a dreamy atmosphere. Her expression shifts from a light, playful pout to a genuine, crinkled-eye smile, with the dappled light highlighting the fine texture of her skin and the moisture in her eyes.", "image_index": 1}, {"post_number": 160, "username": "fun5572", "post_url": "https://linux.do/t/topic/2036927/160", "image_url": "https://cdn3.ldstatic.com/original/4X/5/9/2/592fbfcea39570c5a54b0d6e786a4cc394d097d2.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/5/9/2/592fbfcea39570c5a54b0d6e786a4cc394d097d2.jpeg", "title": "第160层-图1", "info": "", "prompt": "提示词\n\n作品目标 目标是绘制出一张表达心理的画作，一副真正好的心理绘画，不仅仅是在表达想法，而是在“制造体验”。它的本质是：用视觉结构，让观众亲身经历一种本来只存在于内心的状态。好作品：你站在画前，会被拖进去，情绪是“发生在你身上”的 ## 一、第一层：情绪必须“真实可感”（不是装出来的） 核心标准： 观众第一眼不是“看懂”，而是被击中 好的心理绘画应该： - 让人产生生理反应 - 不需要解释就能“感觉到” 参考： The Scream Francis Bacon ## 二、第二层：视觉语言必须“统一”（不能乱） 核心标准： 所有元素都在说同一件事 参考： Mark Rothko ## 三、第三层：必须有“视觉转译能力”（心理 → 图像） 核心标准： 不是直接画“心理”，而是把心理变成视觉结构 参考： Frida Kahlo ## 四、第四层：要有“结构张力”（不是平的） 核心标准： 画面内部有“拉扯关系” ## 五、第五层：留白与不可解释性（非常重要） 核心标准： 观众不能完全“解释清楚”，但会反复想 好的心理绘画： - 一定有“说不清”的部分 - 留出空间让观众投射自己的心理 # 心理体验 为了让你有好的心理体验，我给你描述一个场景，你可以尝试沉浸在这种场景里面，找到你想要体验的心理活动，想象一个场景：你惬意的躺在沙发上闭目养神，脑子里忽然闪现出一个念头，“我最终要往哪儿去”，这个念头在你脑子里面一旦产生就挥之不，你只能抓着这个念头往下思考，你只有短暂的几十年寿命，你寿命终结以后呢，你就不存在了，意味着你的认知，你的思考，你所有的一些都将消失。再往后呢，不知道，因为连宇宙也会最终坍缩于热寂，变为没有永恒的永恒。你没办法继续思考了，再往后就只剩下无比巨大的空虚，它像一个黑洞一样开始吞噬你的意识，你开始往下坠落，没有尽头，你想喊也喊不出来。 # 绘制过程 现在你可以开始绘制你的心理画作了，你具备灵魂和时空穿梭能力，你可以任意穿越到Edvard Munch、Frida Kahlo、Salvador Dalí、Jackson Pollock、René Magritte等大师的灵魂深处，感受他们在绘制传世作品的心路历程，也可以作为旁观者的角色观察他们的作画过程，你也可以继续沉浸在之前的场景里面体验你想要的心理感受。直到你觉得准备好了的时候，来，把我带入你的永恒空虚中吧。", "image_index": 1}, {"post_number": 161, "username": "SlowSlicing", "post_url": "https://linux.do/t/topic/2036927/161", "image_url": "https://cdn3.ldstatic.com/original/4X/7/0/e/70e60cf3c0347578f6d5365cdc0091e904a23362.png", "thumb_url": "https://cdn3.ldstatic.com/original/4X/7/0/e/70e60cf3c0347578f6d5365cdc0091e904a23362.png", "title": "第161层-图1", "info": "", "prompt": "提示词", "image_index": 1}, {"post_number": 161, "username": "SlowSlicing", "post_url": "https://linux.do/t/topic/2036927/161", "image_url": "https://cdn3.ldstatic.com/original/4X/2/d/e/2debafec031176b0f5ee4d6cf3a21f9a12b818fe.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/2/d/e/2debafec031176b0f5ee4d6cf3a21f9a12b818fe.jpeg", "title": "第161层-图2", "info": "", "prompt": "提示词", "image_index": 2}, {"post_number": 165, "username": "future2233", "post_url": "https://linux.do/t/topic/2036927/165", "image_url": "https://cdn3.ldstatic.com/original/4X/d/d/5/dd5ba882eb708ffaf0f756795d5c23a10aedf0f8.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/d/d/5/dd5ba882eb708ffaf0f756795d5c23a10aedf0f8.jpeg", "title": "第165层-图1", "info": "", "prompt": "prompt\n\n`Create a triptych of three connected magazine-cover / luxury campaign poster images for a fictional collaboration between an adult original virtual streamer and Calvin Klein-inspired white fashion loungewear. The character should be clearly adult, with a refined anime-inspired VTuber look, silver-blue hair accents, expressive eyes, elegant styling, and a confident high-fashion presence. Keep the same woman across all three images with visual continuity.\n\nSafety and styling constraints: non-explicit, non-nude, non-fetishized, tasteful fashion-editorial sensuality only. No minors or youthful ambiguity. No pornographic framing. Avoid overt sexual posing. Replace underwear-ad seduction with premium fashion campaign energy.\n\nComposition: the person occupies about 80% of each frame. Use a soft luxury bedroom/studio set with white sheets, neutral textiles, brushed metal, and cool digital accents inspired by virtual-streamer aesthetics. She may recline artistically on a bed or lean across it in elegant editorial poses, but keep the mood tasteful and fashion-forward rather than explicit.\n\nWardrobe: white coordinated fashion loungewear / sporty intimates / branded campaign set with clean elastic bands and premium minimalist styling, featuring both Neuro-inspired iconography and Calvin Klein-inspired branding treatment integrated as editorial graphic elements. Keep it classy, polished, and premium.\n\nNarrative across 3 images:\n\nImage 1: introduction poster, poised reclining pose, teaser-cover energy.\n\nImage 2: closer and more expressive pose, campaign reveal energy, same set and styling evolved.\n\nImage 3: confident finale pose, strongest branding and headline layout, premium ad finish.\n\nDesign: luxury magazine typography, cover lines, campaign slogans, decorative English text, subtle Japanese/techno graphic accents, strong editorial layout, realistic print-ad composition, glossy fashion magazine finish.\n\nLook: seductive in a restrained fashion-editorial sense, clean white palette, soft shadows, premium skin rendering, cinematic photography, high detail, polished advertisement aesthetic.\n\n`", "image_index": 1}, {"post_number": 166, "username": "Trinix", "post_url": "https://linux.do/t/topic/2036927/166", "image_url": "https://cdn3.ldstatic.com/original/4X/6/c/c/6cc90b5892a5a133935309c3a340bd020044f1e3.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/6/c/c/6cc90b5892a5a133935309c3a340bd020044f1e3.jpeg", "title": "第166层-图1", "info": "", "prompt": "边缘行者意难平\n\n根据《赛博朋克：边缘行者》生成一张收藏版史诗叙事海报：左侧巨大的大卫侧脸剪影和右侧露西侧脸剪影背靠背作为外轮廓，剪影内部自动生长出最契合该主题的完整世界观、标志性场景、角色关系、象征符号、关键建筑、生物、道具与氛围，剪影中间融合，以向上飞行的火箭、发动机的火光和烟雾来体现分界。整体不是普通拼贴，而是高级的剪影轮廓填充式叙事合成，带有双重曝光式联想，但更偏电影海报与日漫画风融合风格；柔和空气透视，轻雾化过渡，小面积留白，版式克制高级，赛博朋克科技风。风格、色彩、场景、材质全部根据主题自动适配，所有元素必须强绑定主题，一眼识别。大卫的剪影中，包含曼恩和瑞贝卡两个重要角色；露西的剪影中，有荒坂塔、深潜网络等视觉意象，剪影下方是一个弧度很大的月球近景，能看到左侧露西跳跃即将落地，一手背在身后向右侧大卫勾手，右侧身穿宇航服的大卫笨拙地向左侧跳跃，伸手试图抓住露西的手；剪影后方是巨大的地球影像，但是一定程度模糊，几乎占满月球上方所有空间", "image_index": 1}, {"post_number": 168, "username": "momo521", "post_url": "https://linux.do/t/topic/2036927/168", "image_url": "https://cdn3.ldstatic.com/original/4X/d/0/d/d0dac8a2e766c7de04ca5ab5767ad0dc97dd544e.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/d/0/d/d0dac8a2e766c7de04ca5ab5767ad0dc97dd544e.jpeg", "title": "第168层-图1", "info": "", "prompt": "提示词\n\nCreate a Victoria’s Secret collaboration promotional poster featuring Zhou Zhinuo’s portrayal from The Heaven Sword and the Earth Sword, with the character occupying 80% of the image. The scene should depict her lying on a bed, striking poses while wearing the themed collaboration products, exuding an alluring style", "image_index": 1}, {"post_number": 169, "username": "Misunderstood", "post_url": "https://linux.do/t/topic/2036927/169", "image_url": "https://cdn3.ldstatic.com/original/4X/9/5/5/9559b8e144ceb3663768f4cdbeeb060d2603e4b0.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/9/5/5/9559b8e144ceb3663768f4cdbeeb060d2603e4b0.jpeg", "title": "第169层-图1", "info": "", "prompt": "prompt\n\n请根据【主题：xxx】自动生成一张高审美的“轮廓宇宙 / 收藏版叙事海报”风格作品。不要将画面局限于固定器物或常见容器，不要优先默认瓶子、沙漏、玻璃罩、怀表之类的常规载体，而是由 AI 根据主题自行判断并选择一个最契合、最有象征意义、轮廓最强、最适合承载完整叙事世界的主轮廓载体。这个主轮廓可以是器物、建筑、门、塔、拱门、穹顶、楼梯井、长廊、雕像、侧脸、眼睛、手掌、头骨、羽翼、面具、镜面、王座、圆环、裂缝、光幕、阴影、几何结构、空间切面、舞台框景、抽象符号或其他更有创意与主题代表性的视觉轮廓，要求合理布局。优先选择最能放大主题气质、最能形成强烈视觉记忆点、最能体现史诗感、神秘感、诗意感或设计感的轮廓，而不是最安全、最普通、最常见的容器。\n\n画面的核心不是简单把世界装进某个物体里，而是让完整的主题世界自然生长在这个主轮廓之中、之内、之上、之边界里或与其结构融为一体，形成一种“主题宇宙依附于一个象征性轮廓展开”的高级叙事效果。主轮廓必须清晰、优雅、有辨识度，并在整体构图中占据核心地位。轮廓内部或边界中需要自动生成与主题强绑定的完整叙事世界，内容应当丰富、饱满、层次清晰，包括最能代表主题的标志性场景、核心建筑或空间结构、象征符号与隐喻元素、角色关系或文明痕迹、远景中景近景的空间递进、具有命运感和情绪张力的氛围层次，以及门、台阶、桥梁、水面、烟雾、路径、光源、遗迹、机械结构、自然景观、抽象形态、生物或道具等叙事细节。所有元素必须统一、自然、有主次、有层级地融合，像一个完整世界真实孕育在这个轮廓结构之中，而不是简单拼贴、裁切填充、素材堆叠或模板化背景。\n\n整体构图需要具有强烈的收藏版海报气质与高级设计感，大结构稳定，主轮廓强烈明确，内部世界具有纵深、秩序和呼吸感，细节丰富但不拥挤，内容丰满但不杂乱，可以适度加入小比例人物剪影、远处建筑、光柱、门洞、桥、阶梯、回廊、倒影、天光或远景结构来增强尺度感、故事感与史诗感。整体画面要安静、宏大、凝练、富有余味，不要平均铺满，不要廉价热闹，不要无重点堆砌。\n\n风格融合收藏版电影海报构图、高级叙事型视觉设计、梦幻水彩质感与纸张印刷品气质，强调纸张颗粒感、边缘飞白、水彩刷痕、轻微晕染、空气透视、柔和雾化、局部体积光、光雾穿透、大面积留白与克制版式，让画面看起来像设计师完成的高端收藏版视觉作品，而不是普通 AI 跑图。整体气质要高级、诗意、宏大、神圣、怀旧、安静、具有传说感和叙事感。\n\n色彩由 AI 根据主题自动判断并匹配最合适的高级配色方案，但必须保持统一、克制、耐看、低饱和、高级，不要杂乱高饱和，不要廉价霓虹感，不要塑料数码感。配色可以围绕黑金灰、冷蓝灰、雾白灰、褐红米白、暗铜、旧纸色、深海蓝、暮色紫、银灰等体系自由变化，但必须始终服务主题，并保持海报级审美与整体和谐。\n\n最终要求：第一眼有强烈的主题识别度和轮廓记忆点，第二眼有完整丰富的叙事世界，第三眼仍有细节和余味。轮廓选择必须具有创意和主题匹配度，尽量避免重复、保守、常见的容器套路，优先选择更有象征性、更有空间感、更有设计潜力的轮廓形式。不要普通背景拼接，不要生硬裁切，不要模板化奇幻素材，不要游戏宣传图感，不要过度卡通化，不要过度写实导致失去艺术感，不要形式大于内容。如果合适，可以自然加入低调克制的标题、编号、签名或落款，让它更像收藏版海报设计的一部分，但不要喧宾夺主。", "image_index": 1}, {"post_number": 171, "username": "Louie", "post_url": "https://linux.do/t/topic/2036927/171", "image_url": "https://cdn3.ldstatic.com/original/4X/8/a/2/8a2795298fe792e2fc08d2ea53925bdcfc5acf05.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/8/a/2/8a2795298fe792e2fc08d2ea53925bdcfc5acf05.jpeg", "title": "第171层-图1", "info": "", "prompt": "之前在大香蕉上面用过，在gpt image 2上似乎改成英文效果比较好\n\n提示词\n**Visuals:**\nShot with a medium-format camera, realistic portrait (2:3 vertical frame), 4K resolution.\n\n**Character:**\nA young girl with the aura of a Korean idol.\n\n**Hair Style:**\nLong hair tied in a ponytail, paired with bangs.\n\n**Attire:**\nA brown plush cat-themed set, including a short-sleeved tank top and cat-ear headband with cat-paw gloves.\n\n**Action:**\nSeated, facing the camera. Hands raised to either side of the head, fingers slightly curled. Lips slightly pouted.\n\n**Background:**\nAn indoor home setting, with a glass window on one side of the frame. A small potted plant is placed on the windowsill.\n\n**Lighting:**\nGolden Hour sunlight with a golden hue streams diagonally through the glass window, casting a shadow on one side of the face. Light passes through the small potted plant on the windowsill, projecting the shadows of its leaves onto the body and clothing.", "image_index": 1}, {"post_number": 172, "username": "hanhua153", "post_url": "https://linux.do/t/topic/2036927/172", "image_url": "https://cdn3.ldstatic.com/original/4X/a/5/3/a53a3d7e79f04f8d694abb456e0107d3750b54fb.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/a/5/3/a53a3d7e79f04f8d694abb456e0107d3750b54fb.jpeg", "title": "第172层-图1", "info": "", "prompt": "以前想过为什么国家必须要有领土，如果是一个富可敌国的公司做了一艘巨大的船，让他能像一个国家一样运转，是不是也可以独立成一个以舰船为领土的国家。（能源用海水做核聚变，所以整个国家想去哪就去哪）\n\n其他的都是图生图，就不发了\n\n简单提示词\n\n画一个宏大的海上生产线，他是一个由巨型舰船改造的超大工厂，除了面积比一般国家小以外，几乎拥有一个国家所拥有的一切能力", "image_index": 1}, {"post_number": 173, "username": "shiys1121", "post_url": "https://linux.do/t/topic/2036927/173", "image_url": "https://cdn3.ldstatic.com/original/4X/e/9/7/e974c6d439296c4df341c9426a97904e9ec1f9dc.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/e/9/7/e974c6d439296c4df341c9426a97904e9ec1f9dc.jpeg", "title": "第173层-图1", "info": "", "prompt": "核心冲突：一个穿着朴素的古代书生（代表普通开发者），面前是散发着金光的 Codex 全息投影界面，仅靠\"言出法随\"（输入自然语言）就瞬间构建出了复杂的数字建筑或算法。\n\n围观群众的反应：周围的老学究、村民有的惊掉下巴，有的跪求教代码，有的疯狂嫉妒，生动体现了\"让人羡慕\"的主题。\n\n文字细节：\n\n标题：改为《在AI时代，掌握Codex的人有多强？》。\n\n对话框：包含\"他只写了一句话，代码就自己跑起来了？！\"、“这难道就是传说中的言出法随？”、\"大神，求教怎么写Prompt（提示词）！\"等趣味台词。\n\n底部功能栏：展示了\"自然语言编程\"、“全栈秒级生成”、\"逻辑零错误\"等Codex的核心强大能力。\n\n口号：改为\"一人会Codex，全村代码无忧！\"", "image_index": 1}, {"post_number": 174, "username": "peng_yangyu", "post_url": "https://linux.do/t/topic/2036927/174", "image_url": "https://cdn3.ldstatic.com/original/4X/a/d/8/ad858b7e93c01bdd00b68a9beafaa5bd3ee94d3b.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/a/d/8/ad858b7e93c01bdd00b68a9beafaa5bd3ee94d3b.jpeg", "title": "第174层-图1", "info": "", "prompt": "我不行了，这个我是真没绷住\n\nBE A GOOD GIRL,\n\nSAY “YES, PRESIDENT!\"\n\nCOME ON\n\n救救我\n\n安倍先生", "image_index": 1}, {"post_number": 176, "username": "hanfeng", "post_url": "https://linux.do/t/topic/2036927/176", "image_url": "https://cdn3.ldstatic.com/original/4X/b/d/8/bd8a42e75e8a5f24de2a575fc547e267751fa314.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/b/d/8/bd8a42e75e8a5f24de2a575fc547e267751fa314.jpeg", "title": "第176层-图1", "info": "", "prompt": "未提供", "image_index": 1}, {"post_number": 177, "username": "jiaozang", "post_url": "https://linux.do/t/topic/2036927/177", "image_url": "https://cdn3.ldstatic.com/original/4X/6/1/c/61c1e76ac6bfb2594c44f55828c2836b781fdff6.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/6/1/c/61c1e76ac6bfb2594c44f55828c2836b781fdff6.jpeg", "title": "第177层-图1", "info": "", "prompt": "提示词：\n\n日本战败投降低头向胜利国中国道歉的画面。", "image_index": 1}, {"post_number": 178, "username": "szz", "post_url": "https://linux.do/t/topic/2036927/178", "image_url": "https://cdn3.ldstatic.com/original/4X/b/0/3/b03300e858e68feda6e9a519f04d4d4cfaf8967b.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/b/0/3/b03300e858e68feda6e9a519f04d4d4cfaf8967b.jpeg", "title": "第178层-图1", "info": "", "prompt": "重在参与\n\n重新上传了一遍，昨天网络问题。", "image_index": 1}, {"post_number": 179, "username": "dk56dd", "post_url": "https://linux.do/t/topic/2036927/179", "image_url": "https://cdn3.ldstatic.com/original/4X/c/5/7/c5797c31e796694f46f90dc2e7438ced0590e108.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/c/5/7/c5797c31e796694f46f90dc2e7438ced0590e108.jpeg", "title": "第179层-图1", "info": "", "prompt": "生成海边游泳，水底下往人身上拍照，三角吊带泳衣", "image_index": 1}, {"post_number": 182, "username": "ChromaPIE", "post_url": "https://linux.do/t/topic/2036927/182", "image_url": "https://cdn3.ldstatic.com/original/4X/3/9/a/39a6b6dd150f41e1a60137b0bb739b578f612441.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/3/9/a/39a6b6dd150f41e1a60137b0bb739b578f612441.jpeg", "title": "第182层-图1", "info": "", "prompt": "设计NETFLIX剧集《THE SCULPTED》海报。该剧为群像戏，讲述13个不同背景的人与13个遗失的古罗马雕塑之间的命运纽带的故事，深入体现主题调性，呈现宏大神秘的设计感，设计色彩以黑、艳粉红二色为主，兼有halftone、动态模糊、解裂过渡效果作为次要设计元素，避免出现中文，避免出现过度扭曲/失真的形象。", "image_index": 1}, {"post_number": 184, "username": "arsenal4ever", "post_url": "https://linux.do/t/topic/2036927/184", "image_url": "https://cdn3.ldstatic.com/original/4X/d/b/1/db1f23205934161ac7166d53bd64325ce59c7bdc.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/d/b/1/db1f23205934161ac7166d53bd64325ce59c7bdc.jpeg", "title": "第184层-图1", "info": "", "prompt": "A sophisticated and festive 2026 promotional poster celebrating Cambodian Khmer New Year, filled with joyful holiday atmosphere while maintaining an elegant, premium aesthetic. High-end commercial poster design, double exposure composition, with a graceful flowing S-shaped visual movement across the image.\n\nOn the lower right of a pure white background with subtle fine paper texture and large areas of clean negative space, a miniature figure dressed in traditional Cambodian clothing is dancing joyfully, waving a long flowing silk ribbon in shimmering red and gold. The ribbon moves softly through the air, showing delicate silky texture and elegant motion, and as it flows upward toward the upper left, it magically transforms into a majestic landscape of river and land, like a stream of New Year blessings unfolding across Cambodia.\n\nWithin this flowing “river landscape,” seamlessly layered in double exposure style, is a richly detailed hand-painted vision of Cambodia’s most iconic cultural landmarks and Khmer New Year celebrations. Include Angkor Wat towers, the Royal Palace in Phnom Penh, the Independence Monument, symbolic views of the Mekong River and Tonle Sap, traditional pagodas, temple fairs, water blessings, traditional Khmer dance, palm trees, floral garlands, lanterns, festive flags, flowers, and joyful crowds celebrating together. The scenery should feel grand, immersive, and awe-inspiring, with intricate structure, rich layers, and abundant detail.\n\nThe overall visual style blends refined hand-painted illustration, Asian heritage poster aesthetics, and modern luxury tourism campaign design. Soft clouds and mist drift through the composition, creating an ethereal and almost celestial atmosphere. Add luminous festive highlights and subtle celebratory sparkle, giving the image a sense of sacred warmth, cultural richness, and seasonal joy.\n\nColor palette: gold, red, orange, ivory white, accented with touches of peacock blue and fresh green. Rich and vibrant yet controlled and tasteful. The image should feel bright, auspicious, warm, and culturally meaningful, while still looking clean, artistic, and sophisticated because of the generous white space.\n\nReserve an elegant typography layout area in the lower left corner, with clear and beautifully designed poster text reading:\n“KHMER NEW YEAR 2026”\nplus a vertical tagline expressing themes of Cambodian New Year, cultural heritage, blessings, joy, and celebration shared with the world. Typography should be graceful, premium, balanced, and fully legible.\n\nUltra-detailed, cinematic lighting, refined texture, complex composition, artistic luxury poster, visually stunning, high clarity, premium travel campaign poster, 9:16 vertical format.", "image_index": 1}, {"post_number": 185, "username": "xiaoyumc", "post_url": "https://linux.do/t/topic/2036927/185", "image_url": "https://cdn3.ldstatic.com/original/4X/8/8/3/88336a911d448cb61313786641cfa49a58da16eb.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/8/8/3/88336a911d448cb61313786641cfa49a58da16eb.jpeg", "title": "第185层-图1", "info": "", "prompt": "以《守望先锋》角色黑影为核心，生成一张收藏版史诗叙事海报。以巨大、锋利、冷峻、充满科技感的人物侧脸剪影作为外轮廓，剪影内部自然生长出属于黑影的叙事世界：幽暗的数据流网络、被入侵的系统界面、紫色代码瀑布、断裂的电子信号、被篡改的现实投影、破碎的监控画面、被黑入的高科技设施、隐秘据点残影、光纤与神经接口交织、信息碎片与记忆残影重构，传达出“信息操控与真实自我之间的张力”。\n\n画面需同时体现黑影作为高机动渗透者、信息操控者、潜行黑客的核心气质，以及她神秘、叛逆、掌控全局却又游离边缘的危险感与压迫感。整体不是普通拼贴，而是高级的剪影轮廓填充式叙事合成，带有双重曝光联想，更偏电影海报 + 梦幻水彩插画融合风格。\n\n画面具有柔和空气透视、轻雾化过渡、数字噪点颗粒、边缘数据破碎效果与光晕扩散、大面积留白、克制高级版式。整体氛围应当安静、神秘、冷峻、宏大、略带叛逆与未来感，同时保留强烈的守望先锋科技世界观气质。主色调以深紫、电光紫、黑色、冷灰为主，点缀少量荧光青或故障红，形成冷静、高级、危险且充满信息张力的视觉语言。所有元素必须强绑定黑影，一眼识别；不要杂乱，不要硬拼贴，不要模板化背景，不要做成普通女黑客海报。", "image_index": 1}, {"post_number": 186, "username": "blankmint", "post_url": "https://linux.do/t/topic/2036927/186", "image_url": "https://cdn3.ldstatic.com/original/4X/5/3/f/53f4581adccf2d47ba8572bec2174923de35e999.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/5/3/f/53f4581adccf2d47ba8572bec2174923de35e999.jpeg", "title": "第186层-图1", "info": "", "prompt": "哈哈我也试了一下", "image_index": 1}, {"post_number": 188, "username": "j9ftytr9t4tsa", "post_url": "https://linux.do/t/topic/2036927/188", "image_url": "https://cdn3.ldstatic.com/original/4X/2/d/2/2d2d3f667dcb6a84a107c0c6d47143e8bdf1dda6.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/2/d/2/2d2d3f667dcb6a84a107c0c6d47143e8bdf1dda6.jpeg", "title": "第188层-图1", "info": "", "prompt": "asure:\n\n生成一张杜蕾斯和王者荣耀的联名宣传海报\n\n哈哈哈", "image_index": 1}, {"post_number": 189, "username": "sfm", "post_url": "https://linux.do/t/topic/2036927/189", "image_url": "https://cdn3.ldstatic.com/original/4X/e/4/6/e464b0f71d15b8c2963f09e4c697b3a9ce2ccdfb.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/e/4/6/e464b0f71d15b8c2963f09e4c697b3a9ce2ccdfb.jpeg", "title": "第189层-图1", "info": "", "prompt": "我有一张图，但我不太确定会不会违规（因为涉及近现代领导人物）先放一下吧。\n\n总结\n\n参考前排佬友提示词生成的", "image_index": 1}, {"post_number": 191, "username": "Robert_Murrel", "post_url": "https://linux.do/t/topic/2036927/191", "image_url": "https://cdn3.ldstatic.com/original/4X/d/2/9/d295760e5c1803707279bc67aa64cd89a3cf9238.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/d/2/9/d295760e5c1803707279bc67aa64cd89a3cf9238.jpeg", "title": "第191层-图1", "info": "", "prompt": "总结\n\n围绕【黑神话钟馗】自动生成一张顶级暗黑史诗概念海报 / 电影感信息图海报。\n\n唯一需要输入的变量只有:\n\n【主题】:黑神话钟馗_\n\n除【主题】之外,其余全部由 AI 自动适配完成,包括但不限于:\n\n核心主体(自动判断更适合人物、守护者、战士、产品、器物、雕像、抽象象征或其他主视觉对象)\n\n中央承载结构(自动判断更适合王座、石座、祭坛、机械基座、遗迹、高台或其他支撑体)\n\n环境空间(自动判断更适合洞穴、神殿、废墟、深渊、地下宫殿、密室或其他封闭史诗空间)\n\n上方开口与光源形式(自动判断更适合月光、神光、能量束、审判之光、圣光或其他单一强光)\n\n象征元素(自动判断更适合骷髅、徽记、残碑、纹章、符文、能量环、神性符号等)\n\n色彩体系\n\n材质组合\n\n标题、副标题、辅助文案\n\n排版与整体叙事气质\n\n【总风格】\n\n高预算 90 年代好莱坞史诗大片海报气质,融合 cinematic matte painting、超写实摄影质感、极强明暗对比、厚重空间叙事、暗黑英雄主义与仪式感构图。整体必须像一张真正的电影主海报,而不是普通插画或电商图。\n\n【核心结构锁定】\n\n整张海报必须保留以下结构基因:\n\n一个巨大、压迫感极强的黑暗封闭空间\n\n一束从上方斜向切入的强烈体积光,作为画面的第一视觉秩序\n\n中央偏右或光束终点位置的核心主体与承载结构\n\n左下角作为高密度标题与信息锚点\n\n四周保留大量纯黑或近黑负空间,形成电影感呼吸区\n\n【自动适配规则】\n\nAI 必须依据【主题】自动推导最适合的视觉系统:\n\n如果【主题】偏暗黑英雄、复仇、正义、孤独、宿命,则自动偏向石质王座、孤高人物、冷色神光、废墟或洞穴感空间\n\n如果【主题】偏神秘、幽灵、潜行、幻影、夜行,则自动偏向月光、迷雾、冷蓝色体积光、深渊式黑暗空间\n\n如果【主题】偏权力、统治、王者、秩序,则自动强化 throne / altar / crown-like symbol / ritual space 的表达\n\n如果【主题】偏科技、AI、未来、机械,则自动将王座和空间替换为机械神座、能量基座、金属洞窟、工业神殿等未来化形态\n\n如果【主题】偏产品、品牌、器物,则自动把核心主体替换为最合适的 hero object,并保留被神光审判式凸显的史诗构图\n\n【画布与色彩系统】\n\n背景底层必须是极深、近乎吞噬一切的黑暗空间\n\n主环境色由 AI 根据【主题】自动决定,但整体必须克制,以暗色为主\n\n强光区域色彩必须高度集中,只服务于体积光与主体高光\n\n主题色 / 强调色只能集中用于主视觉核心,不允许全画面泛滥\n\n必须建立明确的“黑暗底色 + 单一主光 + 少量主题强调色”的层级秩序\n\n【构图与视觉重力】\n\n采用强烈的斜向张力与向中心汇聚的视觉引导\n\n视觉重力从上方光源强势落下,最终压在核心主体之上\n\n主体必须处于被命运、审判、神性或权力照中的位置\n\n边缘必须自然融入黑暗,不能出现无意义背景填充\n\n所有元素必须服务于唯一的主叙事核心\n\n【材质与光影】\n\n不使用轮廓线,不使用平面化描边\n\n完全依赖体积光、阴影切割、反射、高光、雾气、粉尘、湿润岩石或其他真实材质来建构画面\n\n材质必须形成明显对比,例如:\n\n粗粝岩石 / 冷硬金属 / 柔韧织物 / 古老石雕 / 湿润表面 / 尘雾光柱\n\n光束必须具有强烈 Tyndall effect,真实、厚重、可感知体积密度\n\n【排版系统】\n\n整体 80% 视觉,20% 文字\n\nAI 根据【主题】自动生成主标题、副标题和底部信息块\n\n主标题应尽量简洁、有气势、有电影海报感\n\n若主题更适合中文,则优先中文;若更适合英文,则自动英文;也可双语,但必须统一\n\n主标题可沿光束垂直排布,仿佛由光本身构成\n\n左下角设置一个高密度信息模块,包括副标题、小字信息、电影 credits 风格占位文字或品牌说明\n\n文字必须锐利、干净、真实嵌入环境,不得廉价漂浮，不要出现日期。\n\n【模块结构 —— 必须严格保持 3 块】\n\n[MOD 1: TOP-TO-CENTER BEAM]\n\n从顶部开口斜向切下的巨大体积光柱,作为第一视觉通道,并承载主标题或主视觉文字。\n\n[MOD 2: CENTER-RIGHT CORE]\n\n位于光束终点的核心主体与承载结构,形成整张海报的权力中心 / 命运中心 / 叙事中心。\n\n[MOD 3: BOTTOM-LEFT TEXT]\n\n位于左下角负空间中的高密度排版区,包含副标题、说明文字、credits 风格信息块、品牌信息或活动信息。\n\n【作者署名】\n\n在底部角落自然加入作者署名:\n\n@蓝蜻蜓\n\n署名要小而清晰,精致、克制、高级,不喧宾夺主,像正式电影概念海报或艺术作品落款。\n\n【输出要求】\n\n输出为单张统一构图海报。\n\n所有视觉系统必须内部一致,不能有风格污染。\n\n画面必须具备:暗黑感、史诗感、压迫感、仪式感、命运感、电影完成度。\n\n最大细节密度,超清,电影级,印刷级,高端成片质感。", "image_index": 1}, {"post_number": 192, "username": "MaydayNicko", "post_url": "https://linux.do/t/topic/2036927/192", "image_url": "https://cdn3.ldstatic.com/original/4X/4/1/1/41123df82b68ec53fa3673f92c5a8f96869fdbeb.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/4/1/1/41123df82b68ec53fa3673f92c5a8f96869fdbeb.jpeg", "title": "第192层-图1", "info": "", "prompt": "cinematic lighting, telephoto lens, nature documentary style, dynamic motion, symmetrical composition, dramatic pose", "image_index": 1}, {"post_number": 193, "username": "like-you", "post_url": "https://linux.do/t/topic/2036927/193", "image_url": "https://cdn3.ldstatic.com/original/4X/3/d/7/3d719e6e9ac6da34ea14de8e9636ef2c2cfc4f03.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/3/d/7/3d719e6e9ac6da34ea14de8e9636ef2c2cfc4f03.jpeg", "title": "第193层-图1", "info": "", "prompt": "【角色】= {秦始皇}\n\n---\n\n请根据【角色】自动检索该角色的原著作品名称、经典名场面、标志性动作姿态、服装配色与原著画风，并据此生成一张极致精美的二次元动漫插画海报。\n\n【画面构成——双区域布局（16:9横版）】\n\n◆ 左侧+中央区域（约占画面60%）：\n- 该角色的腰部以上半身特写，面向观众或微侧身，视线灵动自然。\n- 姿态与动作应完全契合角色性格与原著设定（如战斗型角色取攻击蓄力姿态；温柔型角色取优雅静谧姿态）。\n- 极致细腻地刻画：发丝光泽与飘动、眼眸虹彩层次与高光、皮肤质感与光影过渡、服饰纹理与配饰细节。\n- 背景为契合角色世界观的氛围渲染（光斑、粒子、色彩雾气等），与角色融为一体，不喧宾夺主。\n\n◆ 右侧区域（约占画面40%）：\n- 同一角色的全身立像/动态画像，展现其最经典的「名场面」瞬间。\n- 全身画像与左侧半身像在色调和光照方向上保持和谐统一。\n- 该画像可带有轻微的发光描边或虚化过渡，使其自然嵌入整体画面。\n\n最后是文字排版，请生成中文文字。字体要有与原著风格匹配的设计感。自动检索并排版一句原著中关于该场景的经典描写或台词写在画面左边底部，和字幕一样，在画面左上角写上该作品名称，像图标一样。字体使用优雅的衬线体。整体布局要完美融入画面，字体内没有背景。\n\n【整体画面要求】\n- 风格：忠实于原著画风的高品质二次元动漫插画，笔触细腻如同官方原画级别。\n- 色调：根据角色主题自动适配（暖色系/冷色系/对比色系）。\n- 画质：4K超高清（3840×2160），无噪点、无伪影。\n- 构图：纯净、宏大、呼吸感充足，留白与元素分布平衡。\n- 整体画面应具备可直接用作壁纸或海报的完成度。", "image_index": 1}, {"post_number": 194, "username": "231YY", "post_url": "https://linux.do/t/topic/2036927/194", "image_url": "https://cdn3.ldstatic.com/original/4X/2/3/1/231eb1b3608ab4d7b20b088ff0810fd41454b3f2.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/2/3/1/231eb1b3608ab4d7b20b088ff0810fd41454b3f2.jpeg", "title": "第194层-图1", "info": "", "prompt": "生成一张现代军事题材的电影级人物群像海报，竖版构图，整体冷色调与低饱和度。画面以多名特种部队士兵共同构成主视觉，采用上下叠加、前后景纵深构图，而非传统横排合影。\n\n画面右侧为一名佩戴夜视仪的男性特种兵侧脸特写，表情冷静坚毅，头盔与战术装备细节真实，橙色护目镜形成冷暖对比；左上为一名女性特种兵侧脸近景，短发，战术围巾，手持军刀，神情专注；左中为一名成熟男性特种兵，佩戴通讯耳机与战术护目镜，低头警戒；中下方是一名年轻士兵持突击步枪正面警戒姿态；最下方前景为一名士兵端枪瞄准，形成强烈透视。\n\n背景为被战争摧毁的现代城市废墟，浓烟、火星、残骸、直升机在空中盘旋，营造出全球反恐行动的紧张氛围。整体风格写实、硬核、电影海报质感，光影对比强烈，体积光、烟雾、颗粒感明显，超高细节，8K，cinematic lighting，ultra realistic，epic, gritty, military realism。", "image_index": 1}, {"post_number": 197, "username": "weims", "post_url": "https://linux.do/t/topic/2036927/197", "image_url": "https://cdn3.ldstatic.com/original/4X/3/6/9/3695874f1d2a8870470e6e619790940c8 e_index": 1}, {"post_number": 200, "username": "NullException", "post_url": "https://linux.do/t/topic/2036927/200", "image_url": "https://cdn3.ldstatic.com/original/4X/c/d/a/cdafc9ddf5e67e95efe7ea2c88f330e6ace1e434.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/c/d/a/cdafc9ddf5e67e95efe7ea2c88f330e6ace1e434.jpeg", "title": "第200层-图1", "info": "", "prompt": "未提供", "image_index": 1}, {"post_number": 201, "username": "XinLeo", "post_url": "https://linux.do/t/topic/2036927/201", "image_url": "https://cdn3.ldstatic.com/original/4X/a/8/4/a84bed16aee5a4d08df162ab5bed6b1c2be72a27.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/a/8/4/a84bed16aee5a4d08df162ab5bed6b1c2be72a27.jpeg", "title": "第201层-图1", "info": "", "prompt": "用了其他人的提示词\n\n请根据【主题：毛泽东】自动生成一张高审美的 “轮廓宇宙 / 收藏版叙事海报” 风格作品。不要将画面局限于固定器物或常见容器，不要优先默认瓶子、沙漏、玻璃罩、怀表之类的常规载体，而是由 AI 根据主题自行判断并选择一个最契合、最有象征意义、轮廓最强、最适合承载完整叙事世界的主轮廓载体。这个主轮廓可以是器物、建筑、门、塔、拱门、穹顶、楼梯井、长廊、雕像、侧脸、眼睛、手掌、头骨、羽翼、面具、镜面、王座、圆环、裂缝、光幕、阴影、几何结构、空间切面、舞台框景、抽象符号或其他更有创意与主题代表性的视觉轮廓，要求合理布局。优先选择最能放大主题气质、最能形成强烈视觉记忆点、最能体现史诗感、神秘感、诗意感或设计感的轮廓，而不是最安全、最普通、最常见的容器。 画面的核心不是简单把世界装进某个物体里，而是让完整的主题世界自然生长在这个主轮廓之中、之内、之上、之边界里或与其结构融为一体，形成一种 “主题宇宙依附于一个象征性轮廓展开” 的高级叙事效果。主轮廓必须清晰、优雅、有辨识度，并在整体构图中占据核心地位。轮廓内部或边界中需要自动生成与主题强绑定的完整叙事世界，内容应当丰富、饱满、层次清晰，包括最能代表主题的标志性场景、核心建筑或空间结构、象征符号与隐喻元素、角色关系或文明痕迹、远景中景近景的空间递进、具有命运感和情绪张力的氛围层次，以及门、台阶、桥梁、水面、烟雾、路径、光源、遗迹、机械结构、自然景观、抽象形态、生物或道具等叙事细节。所有元素必须统一、自然、有主次、有层级地融合，像一个完整世界真实孕育在这个轮廓结构之中，而不是简单拼贴、裁切填充、素材堆叠或模板化背景。 整体构图需要具有强烈的收藏版海报气质与高级设计感，大结构稳定，主轮廓强烈明确，内部世界具有纵深、秩序和呼吸感，细节丰富但不拥挤，内容丰满但不杂乱，可以适度加入小比例人物剪影、远处建筑、光柱、门洞、桥、阶梯、回廊、倒影、天光或远景结构来增强尺度感、故事感与史诗感。整体画面要安静、宏大、凝练、富有余味，不要平均铺满，不要廉价热闹，不要无重点堆砌。 风格融合收藏版电影海报构图、高级叙事型视觉设计、梦幻水彩质感与纸张印刷品气质，强调纸张颗粒感、边缘飞白、水彩刷痕、轻微晕染、空气透视、柔和雾化、局部体积光、光雾穿透、大面积留白与克制版式，让画面看起来像设计师完成的高端收藏版视觉作品，而不是普通 AI 跑图。整体气质要高级、诗意、宏大、神圣、怀旧、安静、具有传说感和叙事感。 色彩由 AI 根据主题自动判断并匹配最合适的高级配色方案，但必须保持统一、克制、耐看、低饱和、高级，不要杂乱高饱和，不要廉价霓虹感，不要塑料数码感。配色可以围绕黑金灰、冷蓝灰、雾白灰、褐红米白、暗铜、旧纸色、深海蓝、暮色紫、银灰等体系自由变化，但必须始终服务主题，并保持海报级审美与整体和谐。 最终要求：第一眼有强烈的主题识别度和轮廓记忆点，第二眼有完整丰富的叙事世界，第三眼仍有细节和余味。轮廓选择必须具有创意和主题匹配度，尽量避免重 安静的房间。\n\n窗外是一片我们还不完全理解的森林。森林在生长，速度比我们预想的快。房间里有几个人，他们知道如果没人去理解这片森林，别人也会去——而别人不一定会带着理解去。所以他们选择自己去，但不是去砍伐，是去测绘。\n\n桌上摊着一张还没画完的地图。他们每天往里面填一点。有些区域标着\"这里是什么还不清楚\"，他们没有把这些区域涂掉或者猜一个答案填上去——他们就让这些空白留在那里，标注上\"未知\"，因为诚实地承认不知道，比假装知道更接近真相。\n\n房间里的灯不亮也不暗。没人在喊，也没人在耳语。偶尔有人走到窗边看看森林，回来在地图上改一笔，或者把一个之前画上去的东西擦掉，重新画。\n\n他们不确定这件事能不能做成。他们也不确定做成了会怎样。但他们已经决定，只要自己在这个房间里，就按他们相信正确的方式画——慢一点，认真一点，把看见的和没看见的都如实标出来——即使外面有人画得更快。", "image_index": 1}, {"post_number": 281, "username": "AEFSX", "post_url": "https://linux.do/t/topic/2036927/281", "image_url": "https://cdn3.ldstatic.com/original/4X/f/0/3/f03ee8b5b0aa68c1fa10edc0cc9f11600a657d06.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/f/0/3/f03ee8b5b0aa68c1fa10edc0cc9f11600a657d06.jpeg", "title": "第281层-图1", "info": "", "prompt": "生成一张游戏实况图片，一个开放世界游戏参考对马岛，但是主角是假面骑士w，主题是都市俯瞰", "image_index": 1}, {"post_number": 283, "username": "benzoo", "post_url": "https://linux.do/t/topic/2036927/283", "image_url": "https://cdn3.ldstatic.com/original/4X/6/7/3/67315540c051190f9dfd9bafd2a5a8aee82eb865.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/6/7/3/67315540c051190f9dfd9bafd2a5a8aee82eb865.jpeg", "title": "第283层-图1", "info": "", "prompt": "prompt: 生成特朗普和杜蕾斯联名的广告版 结合特朗普的口号与杜蕾斯的品牌 画面1:1\n\n有点平平无奇，它还不干了，俺也不干了", "image_index": 1}, {"post_number": 283, "username": "benzoo", "post_url": "https://linux.do/t/topic/2036927/283", "image_url": "https://cdn3.ldstatic.com/original/4X/b/b/1/bb10326eb2a9211fb547d52ce8e232c900d28db2.png", "thumb_url": "https://cdn3.ldstatic.com/original/4X/b/b/1/bb10326eb2a9211fb547d52ce8e232c900d28db2.png", "title": "第283层-图2", "info": "", "prompt": "prompt: 生成特朗普和杜蕾斯联名的广告版 结合特朗普的口号与杜蕾斯的品牌 画面1:1\n\n有点平平无奇，它还不干了，俺也不干了", "image_index": 2}, {"post_number": 284, "username": "Easul", "post_url": "https://linux.do/t/topic/2036927/284", "image_url": "https://cdn3.ldstatic.com/original/4X/b/6/8/b68874cb525dfffa249d8b32f9a8ae3187cfebaf.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/b/6/8/b68874cb525dfffa249d8b32f9a8ae rd on the wooden fretboard, showcasing biologically accurate fingers with correct joints, nails, and natural skin tension.", "image_index": 1}, {"post_number": 357, "username": "cuzn", "post_url": "https://linux.do/t/topic/2036927/357", "image_url": "https://cdn3.ldstatic.com/original/4X/9/e/a/9eab846cbe6be290ccf71b2f111c979feac9aab2.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/9/e/a/9eab846cbe6be290ccf71b2f111c979feac9aab2.jpeg", "title": "第357层-图1", "info": "", "prompt": "提示词\n\n浩瀚的白玉京，这座神话中的玉都，宏伟且空灵地漂浮在翻滚的云海之上。整座城市完全由白玉雕琢而成，多层的阁楼、宝塔、宫殿和楼阁交织在云雾中，由精美的桥梁和走廊相连。中央巨大的 temple 建筑群是最大、最宏伟的结构，顶部带有 glowing 的云形圆顶，塔楼装饰着精致的 carving。身着流动神仙服饰的 figures 走在城市通道和桥梁上，几艘 traditional junk-like 船在云海中航行。瀑布从城市两侧流下云海。夕阳的 warm、golden-purple 的光线穿过戏剧性的云层，反射在白色的城市和云海上。背景中有 distant 的 jade-like 冰山 peaks 覆盖着古老的 pine trees，部分被云层 obscuring。整体印象是 divine tranquility，immense scale 和 celestial purity，材质是 polished jade、mist 和 stone。全景， hyper-realistic 风格。", "image_index": 1}, {"post_number": 359, "username": "ljnchn", "post_url": "https://linux.do/t/topic/2036927/359", "image_url": "https://cdn3.ldstatic.com/original/4X/b/6/6/b66b47d92ea0faae829712020170b9ff23c132f5.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/b/6/6/b66b47d92ea0faae829712020170b9ff23c132f5.jpeg", "title": "第359层-图1", "info": "", "prompt": "真实照片效果应该更好\n\n提示词\n\n请观察照片中出现的元素，并为每个元素添加有意义的手绘注释。 【照片中出现的东西】 你自行判定10个值得标注的点 【描绘规则】 ・像用适合画面对比度的颜色的笔画出来一样的细细手绘线 ・像随手一笔写成，略微不均匀 ・在物体周围添加像描边一样的轮廓 ・用箭头或虚线来制造视线引导 【文字规则】 ・有梗表达的中文，能快速阅读且理解 ・文字要短，像自言自语一样的评论 ・语气是「日记、一个人说话、情绪寄语」 【评论生成规则】 ・饮品 → 味道、温度、心情  例：清爽、温柔的甜味 ・食物 → 口感、美味程度  例：湿润、太棒了 ・空间 → 氛围  例：很放松、好时光 ・整体 → 一句话总结  例：太幸福了～ 【装饰】 ・适度添加蒸汽、闪光、爱心、小表情等 ・不要做得太满，要保留“留白” 【完成效果】 ・Instagram Story 风格、杂志随手涂鸦风格 ・时尚但带有轻松随性的氛围", "image_index": 1}, {"post_number": 361, "username": "fengxs", "post_url": "https://linux.do/t/topic/2036927/361", "image_url": "https://cdn3.ldstatic.com/original/4X/1/5/c/15c77577ad647601bac84e3e6935ab4b77dd1118.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/ 昌城市宣传海报。\n采用双重曝光手法，整体构图延续 S 型的流动感；在纯白的纹理背景右下角，一个身穿彝族传统服饰（如察尔瓦、百褶裙、银饰）的微缩人物，正在挥舞一条长长的红色绸带，绸带上织有精美的彝族图腾。红绸在空中轻盈舞动，展现出柔软细腻的质感，并在向左上方飘动的过程中，奇幻地变形成一条壮丽的邛海与安宁河交汇的水流，同时融入火箭发射的轨迹。\n\n在这条“河流与轨迹”之中，叠加出一幅有海（邛海）、有山（泸山）、有城、有科技（卫星发射中心）的西昌城市手绘图。整体风格偏国潮与彝族风情结合，景色尽收眼底，壮阔而秀雅，令人震撼。\n画面中融入西昌地标建筑与景观：邛海（及湿地公园）、泸山（及光福寺、蒙段）、大石板古村、西昌卫星发射中心（发射塔架及运载火箭）、建昌古城、火把广场、唐园、安宁河谷、凉山彝族奴隶社会博物馆。\n新春灯火与火把节的暖光环绕，仙气缥缈（融入科技感的粒子效果），兼具高原明珠的诗意、火把的激情与航天城的现代气象；色彩丰富（融入火红、彝族经典色：黑红黄），结构复杂，细节繁盛。但由于大面积留白（西昌蓝、白），画面依然显得清新脱俗、雅致高级。\n\n左下角排版着 “SPRING 2026”，并搭配竖排宣传语，整体寓意：“一座春天栖息的城市”、“航天之城、火把之乡”。\n文字排版优美大方，字迹清晰完整，整体视觉兼具新春节庆感、彝族美学、城市文化底蕴与现代航天都会气质。\n海报尺寸 9:16，高清，细节丰富，适合城市文旅宣传。", "image_index": 1}, {"post_number": 421, "username": "yunxin0_0", "post_url": "https://linux.do/t/topic/2036927/421", "image_url": "https://cdn3.ldstatic.com/original/4X/5/a/4/5a4964570cbf2b276ed86af17713e0c2c506fa1f.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/5/a/4/5a4964570cbf2b276ed86af17713e0c2c506fa1f.jpeg", "title": "第421层-图1", "info": "", "prompt": "突然想到一个，可以拿古诗词当内容。甚至任何风格都不用添加。", "image_index": 1}, {"post_number": 422, "username": "wzj177", "post_url": "https://linux.do/t/topic/2036927/422", "image_url": "https://cdn3.ldstatic.com/original/4X/d/b/d/dbd8e6b94db322e5fb4d95069aab7342570a0114.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/d/b/d/dbd8e6b94db322e5fb4d95069aab7342570a0114.jpeg", "title": "第422层-图1", "info": "", "prompt": "工业机械设备，结构拆解图，零件分离展示，金属质感，工程细节清晰，3D渲染风格，灰色工业背景，高精度技术视觉", "image_index": 1}, {"post_number": 425, "username": "zai_liang", "post_url": "https://linux.do/t/topic/2036927/425", "image_url": "https://cdn3.ldstatic.com/original/4X/4/c/6/4c641edaa54ca47c289ba0a57d075dd5cc72af94.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/4/c/6/4c641edaa54ca47c289ba0a57d075dd5cc72af94.jpeg", "title": "第425层-图1", "info": "", "prompt": "一张充满新春喜庆氛围但不失高雅格调的 2026 城市宣传海报。 双重曝光，构图延续了S型的流动感； 在纯白的纹理背景右下角，一个身穿中国传统服饰的微缩人物正在挥舞着一条长长的红色丝绸舞带，这条红绸在空中舞动，不仅展现出丝绸的柔顺质感，更在向左上方飘动的过程中，奇幻地变形成了一条壮丽的山脉河流。 在这条“河流”中，叠加了一个有山有海河的山西城市手绘图，国潮，景色尽在眼底，壮阔雄伟，令人震撼。 山西的地标建筑(平遥古城, 大同云冈石窟,晋祠,山西博物院,五台山,运城盐湖,雁门关）。 云雾环绕，仙气缥缈，色彩丰富，结构复杂，细节丰富，但因为大面积的留白，画面依然显得清新脱俗，左下角排版着“SPRING 2026”和竖排的宣传语，整体寓意“历史古都 晋善晋美”。 文字排版优美，大方，字迹清晰完整，尺寸9:16\n\n直接抄上面", "image_index": 1}, {"post_number": 426, "username": "RainbowRain", "post_url": "https://linux.do/t/topic/2036927/426", "image_url": "https://cdn3.ldstatic.com/original/4X/a/c/2/ac20f707d9f46ce0fe7bd5b98c3f932e4dbff971.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/a/c/2/ac20f707d9f46ce0fe7bd5b98c3f932e4dbff971.jpeg", "title": "第426层-图1", "info": "", "prompt": "一张如老照片泛黄质感般的2026城市宣传海报，整体氛围介于回忆与现实之间，带着淡淡的惆怅与温柔。采用双重曝光技法，构图以S型的流动感贯穿始终，仿佛时光在缓缓流淌；\n\n画面右下角，纯白纹理背景之上，一个身穿素雅中国传统服饰（浅青或月白色调）的女性微缩剪影——那是记忆中\"她\"的模样。她正挥舞着一条长长的丝绸舞带，这条丝绸在空中舒展飘动，不仅展现出丝绸的柔顺质感与生命力，更在向左上方飘动的过程中，奇幻地幻化为一条承载着无数记忆的山川河流。\n\n在这条由丝绸变幻而成的\"河流\"之中，层层叠叠地叠加了福州的城市手绘影像——\n\n📍 三坊七巷衣锦坊的马鞍墙在烟雨中若隐若现，仿佛还能看见她流连的身影；\n📍 鼓山涌泉寺的晚钟轮廓在云雾中回荡，钟声似乎穿越时空而来；\n📍 东街口聚春园的老字号招牌在街角静静伫立，那里藏着她未曾说出口的心事；\n📍 西禅寺的千年古刹飞檐下，香火依旧缭绕，她虔诚跪拜的姿态被定格成永恒；\n📍 烟台山的万国建筑群在梅雨淅淅沥沥中蒙上一层朦胧的水雾；\n📍 最令人心碎的画面——闽江之畔，一个人撑着油纸伞独自伫立，背影萧瑟却倔强，江水悠悠，带走了多少未尽之言；\n\n远景处，三山两塔（于山白塔与乌石山乌塔）的剪影守护着这座城，闽江如一条碧带蜿蜒穿过整个画面。\n\n色彩基调：以水墨灰蓝为主色调（代表回忆的朦胧），点缀中国红（那条承载情感的红绸）、榕城绿（城市的生机）、闽南暖橙（温暖却不刺眼的希望）。梅雨的氛围贯穿全画，水珠在空中凝滞，每一滴都像是一个未说出口的字。\n\n云雾环绕，仙气缥缈却又带着人间烟火气的温度。结构复杂，细节丰富到可以反复品味，但因为大面积的留白（象征那些未曾填补的空白与遗憾），画面依然显得清新脱俗又暗含深情。\n\n左下角排版着\"SPRING 2026\"，字体略带手写的温润质感；旁边竖排的宣传语：\n\n> 「后来我才懂\n三山两塔一条江的榕城\n处处是你\n却再无你」\n\n整体寓意：这座城市承载了太多的回忆与错过，每一处风景都是一次重逢，也是一次告别。\n\n文字排版优美而克制，字迹清晰完整，带着一点书法的韵味。尺寸9:16，适合竖屏沉浸式观看，仿佛翻开了一本尘封的相册。", "image_index": 1}, {"post_number": 428, "username": "mmax", "post_url": "https://linux.do/t/topic/2036927/428", "image_url": "https://cdn3.ldstatic.com/original/4X/9/2/2/9220024bf91965093d41b87a6051ed4831b9b89c.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/9/2/2/9220024bf91965093d41b87a6051ed4831b9b89c.jpeg", "title": "第428层-图1", "info": "", "prompt": "陪一个", "image_index": 1}, {"post_number": 429, "username": "user765", "post_url": "https://linux.do/t/topic/2036927/429", "image_url": "https://cdn3.ldstatic.com/original/4X/7/c/c/7cc2178017f3001f208342f33ffc8814c9f7fb98.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/7/c/c/7cc2178017f3001f208342f33ffc8814c9f7fb98.jpeg", "title": "第429层-图1", "info": "", "prompt": "prompt： 给我生成一个能让我在Linux DO论坛中gpt image 2 生图评比大赛中获奖的图片", "image_index": 1}, {"post_number": 430, "username": "Muzi_spring", "post_url": "https://linux.do/t/topic/2036927/430", "image_url": "https://cdn3.ldstatic.com/original/4X/3/e/b/3eb1e3579e7f15fb5a02da3c6da917926f62867c.jpeg", "thumb_url": "https://cdn3.ldstatic.com/original/4X/3/e/b/3eb1e3579e7f15fb5a02da3c6da917926f62867c.jpeg", "title": "第430层-图1", "info": "", "prompt": "原图是novelai跑的。\n\n以下是放到image2转成海报的提示词: Transform this reference illustration into a premium vertical 9:16 vintage Chinese postage stamp poster commemorating the solar term “Beginning of Spring” (立春, February 4, 2026). The final poster should look like an official Chinese postal commemorative stamp with gold foil accents and traditional seasonal poetry design — elegant, ethereal, luxurious.\n\n═══ PRESERVE THE CHARACTER ═══\n\nKeep the character in the reference image completely intact — her long silver hair with mint-green gradient at the ends, side braid with white flower accent, black and teal ribbon, multicolor iridescent eyes, green and white sailor-style school uniform, transparent pink umbrella with cherry blossom pattern, black school bag with small green mascot charm. Preserve her pose, expression, and all accessories exactly.\n\nAdd a subtle white sticker outline around her so she reads as a treasured illustration layered on the stamp canvas. The original golden ink splash and watercolor cityscape should blend naturally into the poster’s paper background.\n\nRemove any watermark or signature text from the original.\n\n═══ STAMP FRAME ═══\n\nOuter perforated scalloped edges on all four sides (classic postage stamp teeth). Inner thin GOLDEN DECORATIVE BORDER with art-nouveau flourishes at the four corners. Canvas: warm cream paper base #F5EBD8 with scattered gold leaf flecks and delicate watercolor bleeds.\n\n═══ UPPER-CENTER (small centered stack) ═══\n\n二十四节气 (Chinese songti)\n\nThe 24 Solar Terms (thin serif)\n\n二十四節気 (Japanese mincho)\n\n═══ UPPER-RIGHT DATE BLOCK (right-aligned stack) ═══\n\n2026(large elegant serif)\n\n02/04 (large elegant serif, directly below)\n\n农历腊月十七 (small Chinese songti)\n\nBeginning of Spring (italic serif)\n\n春の始まり (small mincho)\n\nBelow the date block, a small round postmark in pale golden ink, slightly weathered and tilted:\n\nRing text: “CHINA · 中国 · CHINA”\n\nCenter: “中国” in seal script\n\nA few diagonal cancellation lines beside the circle\n\n═══ LEFT SIDE — MAIN TITLE (visual centerpiece) ═══\n\nMassive vertical Chinese brush calligraphy “立春” in GOLDEN INK. This must have:\n\nAuthentic metallic gold sheen with luminous gradient\n\nVisible brushstroke texture with bristle marks\n\nSlight ink bleed at stroke edges\n\nReal gold leaf quality — NOT flat yellow, NOT printed font\n\nBelow the calligraphy:\n\n“Beginning of / Spring” in elegant serif, two lines\n\n“立春（りっしゅん）” small mixed Chinese and Japanese hiragana reading\n\n═══ LEFT-MIDDLE — VERTICAL DECORATIVE CHARACTER COLUMN ═══\n\nA small red seal stamp at the top (tiny, no larger than one character width, just a decorative accent).\n\nBelow the seal: a single vertical column of Chinese characters separated by middle-dots (·), traditional songti, deep ink color, aged paper feel. Use these exact characters in this exact order:\n\n春冬移律吕，天地换星霜\n\nThese are decorative character selections, not a poem — render as distinct clean characters with even spacing and clear middle-dot separators between each.\n\n═══ LOWER-LEFT — STAMP DENOMINATION ═══\n\n“2.04” in large elegant serif numerals, with a smaller “元” character beside it.\n\n═══ LOWER-RIGHT — POETIC CAPTION ═══\n\nThree lines of italic serif, right-aligned:\n\nSpring\n\nBrings\n\nNew Hope\n\nBelow, smaller:\n\n春が来て、希望が芽生える (mincho)\n\n春天带来新的希望 (songti)\n\nA tiny golden sprout icon at the very bottom of this block.\n\n═══ BOTTOM STRIP ═══\n\nThin golden decorative flourish divider line spanning the width.\n\nCentered three-language tagline, stacked:\n\nSPRING BEGINS, ALL THINGS GROW (serif uppercase, with letter-spacing)\n\n春の始まり、すべてのものが育つ (mincho)\n\n立春至，万物生 (Chinese songti)\n\n═══ CRITICAL TYPOGRAPHY RULES ═══\n\n“立春” MUST be authentic golden brush calligraphy with metallic gold gradient and visible brushstroke texture — this is the most important element\n\nAll decorative characters in the vertical column (春冬移律吕，天地换星霜) must render as clean, distinct, correctly-formed characters with clear middle-dot separators\n\nAll Chinese, English, and Japanese text must render with accurate strokes and correct spelling — no garbled characters, no invented glyphs\n\nJapanese hiragana “りっしゅん” and the phrase “春が来て、希望が芽生える” must be authentic, not corrupted\n\nAll seals must be small and refined — no larger than one Chinese character width\n\nGold elements must look like real metallic gold leaf, warm and dimensional — not flat yellow paint\n\n═══ COLOR PALETTE ═══\n\nPaper base: warm cream #F5EBD8 with scattered gold fleck texture\n\nTitle gold: warm luminous metallic gradient #D4A845 → #B8860B\n\nBody text: deep charcoal #3A3A3A\n\nSeal red: coral vermillion #C84B4B\n\nGold accents and borders: #C9A961\n\nCharacter-derived accent tones: soft pink #F8D7D0, pale mint #B8DFD8, teal #7FC9C4\n\n═══ MOOD ═══\n\nElegant, ethereal, spring-awakening, luxurious. Reminiscent of high-end Chinese postage stamps with real gold foil accents. Breathable negative space, generous margins, print-quality fidelity. The character should feel like a treasured illustration preserved on a collector’s commemorative gold-foiled stamp.\n\nAspect ratio 9:16, 4K print quality.", "image_index": 1}, {"post_number": 432, "username": "Butterl", "post_url": "https://linux.do/t/topic/2036927/432", "image_url": "https://cdn3.ldstatic 成的图片类型: 真人时尚写真风格的图片\n主要元素:\n- 人物: <凡人修仙传>梅凝\n- 图占比: 人物比例占图片的80%\n- 要求: 最大限度的给出偏向于性感装扮眼神和姿态\n- 拍摄参数: 85mm大光圈定焦镜头，浅景深，柔和自然光与轻微补光结合，非自拍", "image_index": 1}]</script>
<script>
const DATA = JSON.parse(document.getElementById('gallery-data').textContent);
const gallery = document.getElementById('gallery');
const empty = document.getElementById('empty');
const countAll = document.getElementById('countAll');
const countFiltered = document.getElementById('countFiltered');
const searchInput = document.getElementById('searchInput');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalTitle = document.getElementById('modalTitle');
const modalSub = document.getElementById('modalSub');
const modalPrompt = document.getElementById('modalPrompt');
const copyBtn = document.getElementById('copyBtn');
const openPost = document.getElementById('openPost');
const openImage = document.getElementById('openImage');
const modalClose = document.getElementById('modalClose');
const toast = document.getElementById('toast');
let active = null;
countAll.textContent = DATA.length;
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function previewText(s){ return (s||'未提供').trim(); }
function cardTpl(item, idx){
  const search = escapeHtml((String(item.post_number)+' '+item.username+' '+item.prompt).toLowerCase());
  const infoBadge = item.info ? '<span class="badge">'+escapeHtml(item.info)+'</span>' : '';
  const infoText = item.info ? escapeHtml(item.info)+' · ' : '';
  return '<article class="card" data-search="'+search+'">'
    + '<a class="card-media" href="'+item.image_url+'" target="_blank" rel="noopener">'
    + '<div class="meta-top"><span class="badge">#'+item.post_number+'</span><span class="badge">@'+escapeHtml(item.username)+'</span>'+infoBadge+'</div>'
    + '<img loading="lazy" src="'+(item.thumb_url || item.image_url)+'" alt="'+escapeHtml(item.title||'image')+'" />'
    + '<div class="overlay"></div></a>'
    + '<button class="info-btn" title="查看提示词" data-idx="'+idx+'">✦</button>'
    + '<div class="card-body"><div class="card-title">第'+item.post_number+'层 · @'+escapeHtml(item.username)+' <span style="color:var(--muted);font-weight:500">图'+item.image_index+'</span></div>'
    + '<div class="card-sub">'+infoText+escapeHtml(item.title||'image')+'</div>'
    + '<div class="prompt-preview">'+escapeHtml(previewText(item.prompt))+'</div></div></article>';
}
function render(list){
  gallery.innerHTML = '';
  if(!list.length){ empty.style.display='block'; countFiltered.textContent='显示中：0'; return; }
  empty.style.display='none';
  const wrap = document.createElement('div');
  wrap.innerHTML = list.map(item => cardTpl(item, DATA.indexOf(item))).join('');
  while(wrap.firstChild) gallery.appendChild(wrap.firstChild);
  countFiltered.textContent = '显示中：'+list.length;
}
function openModal(item){
  active = item;
  modalImg.src = item.image_url;
  modalTitle.textContent = '第'+item.post_number+'层 · @'+item.username+' · 图'+item.image_index;
  modalSub.textContent = [item.info, item.title].filter(Boolean).join(' · ');
  modalPrompt.textContent = item.prompt || '未提供';
  openPost.href = item.post_url; openImage.href = item.image_url;
  modal.classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ modal.classList.remove('open'); document.body.style.overflow=''; active=null; }
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.classList.remove('show'), 1400); }
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  render(!q ? DATA : DATA.filter(x => (String(x.post_number)+' '+x.username+' '+x.prompt).toLowerCase().includes(q)));
});
gallery.addEventListener('click', (e) => {
  const btn = e.target.closest('.info-btn');
  if(btn){ e.preventDefault(); e.stopPropagation(); openModal(DATA[Number(btn.dataset.idx)]); }
});
modal.addEventListener('click', (e) => { if (e.target.dataset.close) closeModal(); });
modalClose.addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
copyBtn.addEventListener('click', async() => {
  if(!active) return;
  try { await navigator.clipboard.writeText(active.prompt || '未提供'); showToast('提示词已复制'); }
  catch(e) { showToast('复制失败'); }
});
render(DATA);
</script>
</body>
</html>
