name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 6"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.sync.outputs.version }}
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone basketikun upstream
        shell: bash
        run: |
          rm -rf /tmp/upstream-chatgpt2api
          git clone https://github.com/basketikun/chatgpt2api.git /tmp/upstream-chatgpt2api

      - name: Sync upstream files while keeping FreeBSD automation
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < /tmp/upstream-chatgpt2api/VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

          rsync -a --delete /tmp/upstream-chatgpt2api/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/' \
            --exclude 'docs/freebsd.md' \
            --exclude 'scripts/package-freebsd.sh' \
            --exclude 'services/api.py' \
            --exclude 'services/config.py' \
            --exclude 'services/paths.py' \
            --exclude 'services/version.py'

      - name: Commit synced changes
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync upstream"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push sync commit
        if: steps.commit.outputs.has_changes == 'true'
        shell: bash
        run: |
          git push origin HEAD:main

      - name: Create and push version tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.sync.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Tag $version already exists. Skipping."
            exit 0
          fi
          git tag "$version"
          git push origin "refs/tags/$version"
