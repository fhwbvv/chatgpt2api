name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.sync.outputs.version }}
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone basketikun upstream
        shell: bash
        run: |
          rm -rf /tmp/upstream-chatgpt2api
          git clone https://github.com/basketikun/chatgpt2api.git /tmp/upstream-chatgpt2api

      - name: Sync upstream files while keeping fork automation
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < /tmp/upstream-chatgpt2api/VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

          rsync -a --delete /tmp/upstream-chatgpt2api/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/' \
            --exclude 'docs/freebsd.md' \
            --exclude 'scripts/package-freebsd.sh'

      - name: Re-apply fork deployment patches
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          support_path = Path("api/support.py")
          support_text = support_path.read_text(encoding="utf-8")
          if 'SOURCE_WEB_OUT_DIR = BASE_DIR / "web" / "out"' not in support_text:
              support_text = support_text.replace(
                  'WEB_DIST_DIR = BASE_DIR / "web_dist"\n',
                  'WEB_DIST_DIR = BASE_DIR / "web_dist"\nSOURCE_WEB_OUT_DIR = BASE_DIR / "web" / "out"\n',
              )
          old_block = '''def resolve_web_asset(requested_path: str) -> Path | None:\n    if not WEB_DIST_DIR.exists():\n        return None\n    clean_path = requested_path.strip("/")\n    base_dir = WEB_DIST_DIR.resolve()\n    candidates = [base_dir / "index.html"] if not clean_path else [\n        base_dir / Path(clean_path),\n        base_dir / clean_path / "index.html",\n        base_dir / f"{clean_path}.html",\n    ]\n    for candidate in candidates:\n        try:\n            candidate.resolve().relative_to(base_dir)\n        except ValueError:\n            continue\n        if candidate.is_file():\n            return candidate\n    return None\n'''
          new_block = '''def resolve_web_asset(requested_path: str) -> Path | None:\n    web_roots = [path.resolve() for path in (WEB_DIST_DIR, SOURCE_WEB_OUT_DIR) if path.exists()]\n    if not web_roots:\n        return None\n    clean_path = requested_path.strip("/")\n    for base_dir in web_roots:\n        candidates = [base_dir / "index.html"] if not clean_path else [\n            base_dir / Path(clean_path),\n            base_dir / clean_path / "index.html",\n            base_dir / f"{clean_path}.html",\n        ]\n        for candidate in candidates:\n            try:\n                candidate.resolve().relative_to(base_dir)\n            except ValueError:\n                continue\n            if candidate.is_file():\n                return candidate\n    return None\n'''
          if old_block in support_text:
              support_text = support_text.replace(old_block, new_block)
          support_path.write_text(support_text, encoding="utf-8")

          package_path = Path("web/package.json")
          package = json.loads(package_path.read_text(encoding="utf-8"))
          scripts = dict(package.get("scripts") or {})
          scripts["build"] = "next build --webpack"
          package["scripts"] = scripts
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit synced changes
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync upstream"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push sync commit
        if: steps.commit.outputs.has_changes == 'true'
        shell: bash
        run: |
          git push origin HEAD:main

      - name: Create and push version tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.sync.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Tag $version already exists. Skipping."
            exit 0
          fi
          git tag "$version"
          git push origin "refs/tags/$version"
