name: build-freebsd

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: build-freebsd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    env:
      PACKAGE_BASENAME: chatgpt2api-freebsd-amd64
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Export Python requirements
        shell: bash
        run: |
          python3 -m pip install --upgrade uv
          uv export --frozen --no-dev --format requirements-txt --no-hashes -o requirements.txt

      - name: Build FreeBSD packaged app
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          mem: 4096
          prepare: |
            pkg install -y node npm-node24 python313
            python3.13 -m ensurepip --upgrade || true
          run: |
            chmod +x scripts/package-freebsd.sh
            PYTHON_BIN="python3.13" ./scripts/package-freebsd.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

      - name: Attach archive to tag release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            docs/freebsd.md
