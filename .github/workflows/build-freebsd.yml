name: build-freebsd

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: build-freebsd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    env:
      PACKAGE_BASENAME: chatgpt2api-freebsd-amd64
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build FreeBSD deployment archive
        shell: bash
        run: |
          chmod +x scripts/package-freebsd.sh
          VERSION="${VERSION}" PACKAGE_BASENAME="${PACKAGE_BASENAME}" ./scripts/package-freebsd.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

      - name: Attach archive to tag release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            docs/freebsd.md
            scripts/start-freebsd.sh
